server:
  host: "0.0.0.0"
  port: 8000

matrix:
  width: 32
  height: 18
  output_driver: "serial"  # serial or rgbmatrix
  serial_device: "/dev/ttyACM0"
  layout_left_to_right: true
  fps: 60
  gamma: 2.5
  rgbmatrix:
    rows: 32
    cols: 32
    hardware_mapping: "regular"
    gpio_slowdown: 2
    show_refresh_rate: false
    luminance_correct: true
    swap_framerate_fraction: 5

canvas:
  decay_rate: 0.0  # 0 = permanent paint, >0 = fade rate per second

default_drawer: "AudioViz"  # drawer selected on startup; falls back to random if unavailable

inputs:
  beats:
    findBeatsCmd: ""
    onset_duration: 0.2
  audio:
    enabled: true  # enables AudioViz drawer
    source: "mac:BlackHole 2ch"  # pulse, alsa:hw:0, mac:<device>, pipe:/path, file:/path
    onset_threshold: 0.4  # bass spike over running average to count as beat (higher = fewer beats)
  video:
    device: 0
    enable_face_detection: false
